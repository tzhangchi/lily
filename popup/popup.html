<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Link Radar</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="title">
          <img id="favicon" class="favicon" alt="" />
          <div class="title-text">
            <div id="pageTitle" class="page-title">Link Radar</div>
            <div id="pageMeta" class="page-meta">未分析</div>
          </div>
        </div>
        <div class="actions">
          <div id="scorePill" class="pill pill-gray">--</div>
          <button id="btnAnalyze" class="btn btn-primary">Analyze</button>
        </div>
      </div>

      <div id="chips" class="chips"></div>

      <div class="tabs">
        <button class="tab active" data-tab="overview">Overview</button>
        <button class="tab" data-tab="links">Links</button>
        <button class="tab" data-tab="insights">Insights</button>
        <button class="tab" data-tab="seo">SEO</button>
        <button class="tab" data-tab="save">Save</button>
      </div>

      <div class="content">
        <div class="panel active" id="panel-overview"></div>
        <div class="panel" id="panel-links"></div>
        <div class="panel" id="panel-insights"></div>
        <div class="panel" id="panel-seo"></div>
        <div class="panel" id="panel-save"></div>
      </div>

      <div class="footer">
        <label class="switch">
          <input id="toggleHighlight" type="checkbox" />
          <span class="slider"></span>
        </label>
        <span class="footer-text">高亮正文外链</span>

        <div class="footer-actions">
          <button id="btnCopySummary" class="btn btn-ghost">Copy Summary</button>
          <button id="btnExportCsv" class="btn btn-ghost">Export CSV</button>
        </div>
      </div>
    </div>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
